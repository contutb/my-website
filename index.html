<!DOCTYPE html>
<html>
<head>
<title>Website dịch vụ</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

/* MENU */
.header{
    background:#007bff;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
}

.hero button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:white;
    color:#007bff;
    font-size:18px;
    cursor:pointer;
}

/* SERVICES */
.services{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:40px;
}

.box{
    background:white;
    padding:20px;
    width:220px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

</style>
</head>

<body>

<div class="header">
🚀 Website dịch vụ của tôi
</div>

<div class="hero">
<h1>Tăng tương tác TikTok & Facebook</h1>
<p>Vào nhanh • Ổn định • Không tụt</p>

<button onclick="alert('Liên hệ Zalo: 0123 456 789')">
Liên hệ ngay
</button>
</div>

<div class="services">

<div class="box">
<h3>Tăng mắt Live</h3>
<p>View Việt, vào nhanh</p>
</div>

<div class="box">
<h3>Tăng Follow</h3>
<p>Info đẹp, ổn định</p>
</div>

<div class="box">
<h3>Tăng Like</h3>
<p>Tương tác thật</p>
</div>

</div>

</body>
</html>
